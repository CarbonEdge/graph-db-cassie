services:
  cassandra:
    image: cassandra:5.0
    container_name: cassie-db
    ports:
      - "9042:9042"
    environment:
      - MAX_HEAP_SIZE=256m
      - HEAP_NEWSIZE=64m
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "SELECT now() FROM system.local;"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s

volumes:
  cassandra_data:
