services:
  cassandra:
    image: cassandra:5.0
    container_name: cassie-db
    ports:
      - "9042:9042"
    environment:
      - MAX_HEAP_SIZE=256m
      - HEAP_NEWSIZE=64m
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "SELECT now() FROM system.local;"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s

  cassie:
    build:
      context: .
    container_name: cassie-api
    ports:
      - "8080:8080"
    environment:
      - CASSANDRA_HOST=cassandra:9042
      - SERVER_PORT=8080
      - RUST_LOG=cassie_api=debug
    depends_on:
      cassandra:
        condition: service_healthy

  cassie-ai:
    build:
      context: ../cassie-ai
    container_name: cassie-ai
    ports:
      - "8081:8081"
    environment:
      - CASSIE_URL=http://cassie:8080
      - LLM_PROVIDER=anthropic
      - LLM_MODEL=claude-sonnet-4-6
      - LLM_API_KEY=${LLM_API_KEY}
    depends_on:
      - cassie

volumes:
  cassandra_data:
